<div class="flex flex-col h-full" id="chat-area-inner">

  <!-- Message history -->
  <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-4">
    {% if messages %}
    {% for message in messages %}
    {% include "partials/message.html" %}
    {% endfor %}
    {% else %}
    <div class="flex h-full items-center justify-center">
      <div class="text-center space-y-2">
        <p class="text-muted-foreground text-sm">Start a conversation</p>
      </div>
    </div>
    {% endif %}
  </div>

  <!-- Input bar -->
  <div class="border-t border-border p-4 bg-card"
    x-data="chatInput({{ {'id': thread.id|string, 'title': thread.title} | tojson if thread else 'null' }})">
    <form hx-post="{% if thread.id %}/api/threads/{{ thread.id }}/messages{% else %}/api/threads{% endif %}"
      hx-target="#messages" hx-swap="beforeend" hx-ext="json-enc" @htmx:after-request="onAfterRequest($event)"
      hx-indicator="#submit" class="flex gap-2 items-end">

      <div class="flex-1 relative">
        <textarea name="content" x-model="message" @keydown.enter.prevent="submitOnEnter($event)"
          placeholder="Message..." rows="1"
          class="w-full resize-none rounded-lg border border-input bg-background px-3 py-2.5 text-sm text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-1 focus:ring-ring min-h-[42px] max-h-40 overflow-y-auto"
          :class="{ 'opacity-50': loading }" :disabled="loading"></textarea>
      </div>

      <button id="submit" type="submit" :disabled="loading || !message.trim()"
        class="shrink-0 inline-flex items-center justify-center w-10 h-10 rounded-lg bg-primary text-primary-foreground hover:opacity-90 transition-opacity disabled:opacity-40 disabled:cursor-not-allowed">
        <svg x-show="!loading" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
        </svg>
        <svg x-show="loading" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
      </button>
    </form>
    <p class="text-xs text-muted-foreground mt-2">Press Enter to send, Shift+Enter for new line</p>
  </div>

</div>

<script>
  function chatInput(thread) {
    return {
      thread: thread,
      message: '',
      loading: false,
      submitOnEnter(event) {
        if (!event.shiftKey) {
          event.target.closest('form').requestSubmit();
        }
      },
      onAfterRequest(event) {
        this.message = '';
        this.loading = false;
        // Scroll to bottom
        const msgs = document.getElementById('messages');
        if (msgs) msgs.scrollTop = msgs.scrollHeight;
      }
    }
  }
</script>
