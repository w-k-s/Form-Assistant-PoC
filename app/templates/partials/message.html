{% if message.role == "user" %}
<div class="flex justify-end">
  <div class="max-w-[75%] rounded-2xl rounded-tr-sm bg-primary text-primary-foreground px-4 py-2.5 text-sm">
    {{ message.content }}
  </div>
</div>
{% else %}
<div class="flex justify-start">
  <div class="flex gap-3 max-w-[80%]">
    <div class="shrink-0 w-7 h-7 rounded-full bg-muted flex items-center justify-center mt-0.5">
      <svg class="w-3.5 h-3.5 text-muted-foreground" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9.75 3.104v5.714a2.25 2.25 0 01-.659 1.591L5 14.5M9.75 3.104c-.251.023-.501.05-.75.082m.75-.082a24.301 24.301 0 014.5 0m0 0v5.714c0 .597.237 1.17.659 1.591L19.8 15M14.25 3.104c.251.023.501.05.75.082M19.8 15a2.25 2.25 0 01-2.25 2.25H6.75A2.25 2.25 0 014.5 15M19.8 15l-1.57-1.573"/>
      </svg>
    </div>
    <div class="rounded-2xl rounded-tl-sm bg-card border border-border px-4 py-2.5 text-sm text-card-foreground leading-relaxed">
      {{ message.content }}
    </div>
  </div>
</div>
{% endif %}
