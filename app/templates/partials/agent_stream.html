<div hx-ext="sse" sse-connect="/api/threads/{{ stream_thread_id }}/stream" sse-swap="token" hx-swap="beforeend"
  hx-target="#agent-bubble-{{ thread_id }}" @sse:done.window="onStreamDone('{{ thread_id }}')"
  id="sse-listener-{{ thread_id }}" class="flex justify-start">

  <div class="flex gap-3 max-w-[80%]">
    <div class="shrink-0 w-7 h-7 rounded-full bg-muted flex items-center justify-center mt-0.5">
      <svg class="w-3.5 h-3.5 text-muted-foreground" fill="none" viewBox="0 0 24 24" stroke="currentColor"
        stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M9.75 3.104v5.714a2.25 2.25 0 01-.659 1.591L5 14.5M9.75 3.104c-.251.023-.501.05-.75.082m.75-.082a24.301 24.301 0 014.5 0m0 0v5.714c0 .597.237 1.17.659 1.591L19.8 15M14.25 3.104c.251.023.501.05.75.082M19.8 15a2.25 2.25 0 01-2.25 2.25H6.75A2.25 2.25 0 014.5 15M19.8 15l-1.57-1.573" />
      </svg>
    </div>
    <div id="agent-bubble-{{ thread_id }}"
      class="rounded-2xl rounded-tl-sm bg-card border border-border px-4 py-2.5 text-sm text-card-foreground leading-relaxed min-h-[38px]">
      <span class="typing-dots inline-flex gap-1 items-center">
        <span class="w-1.5 h-1.5 rounded-full bg-muted-foreground animate-bounce" style="animation-delay:0ms"></span>
        <span class="w-1.5 h-1.5 rounded-full bg-muted-foreground animate-bounce" style="animation-delay:150ms"></span>
        <span class="w-1.5 h-1.5 rounded-full bg-muted-foreground animate-bounce" style="animation-delay:300ms"></span>
      </span>
    </div>
  </div>
</div>

<script>
  // Remove typing indicator on first token and handle done event
  (function () {
    const threadId = '{{ thread_id }}';
    const bubble = document.getElementById('agent-bubble-' + threadId);
    let firstToken = true;

    document.addEventListener('htmx:sseMessage', function (e) {
      if (firstToken && e.detail.type === 'token') {
        firstToken = false;
        const dots = bubble ? bubble.querySelector('.typing-dots') : null;
        if (dots) dots.remove();
      }
      // Scroll to bottom on each token
      const msgs = document.getElementById('messages');
      if (msgs) msgs.scrollTop = msgs.scrollHeight;
    });
  })();

  function onStreamDone(threadId) {
    const listener = document.getElementById('sse-listener-' + threadId);
    if (listener) listener.removeAttribute('sse-connect');
  }
</script>
